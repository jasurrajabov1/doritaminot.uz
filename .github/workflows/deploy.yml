name: Deploy Doritaminot Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e

            # ── 1. Docker ──────────────────────────────────────────────────
            if ! command -v docker &>/dev/null; then
              dnf install -y dnf-plugins-core
              dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
              dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              systemctl enable --now docker
            fi

            # ── 2. Git ─────────────────────────────────────────────────────
            if ! command -v git &>/dev/null; then
              dnf install -y git
            fi

            # ── 3. Nginx ───────────────────────────────────────────────────
            if ! command -v nginx &>/dev/null; then
              dnf install -y nginx
              systemctl enable nginx
            fi

            # ── 4. Loyiha klonlash yoki yangilash ──────────────────────────
            if [ ! -d /var/www/doritaminot/.git ]; then
              mkdir -p /var/www
              git clone https://github.com/jasurrajabov1/doritaminot.uz /var/www/doritaminot
            else
              DB_PATH="/var/www/doritaminot/backend/db.sqlite3"
              [ -f "$DB_PATH" ] && cp "$DB_PATH" /tmp/db_prod_backup.sqlite3
              git -C /var/www/doritaminot fetch origin main
              git -C /var/www/doritaminot reset --hard origin/main
              [ -f /tmp/db_prod_backup.sqlite3 ] && cp /tmp/db_prod_backup.sqlite3 "$DB_PATH"
            fi

            # ── 5. Docker containers ───────────────────────────────────────
            cd /var/www/doritaminot
            docker compose down || true
            docker compose up --build -d
            sleep 8

            docker compose exec -T backend python manage.py migrate --noinput
            docker compose exec -T backend python manage.py collectstatic --noinput

            # ── 6. Certbot o'rnatish ───────────────────────────────────────
            if ! command -v certbot &>/dev/null; then
              dnf install -y epel-release
              dnf install -y certbot python3-certbot-nginx
            fi

            # ── 7. SSL sertifikat (faqat birinchi marta) ──────────────────
            CERT_LIVE="/etc/letsencrypt/live/doritaminot.uz/fullchain.pem"
            if [ ! -f "$CERT_LIVE" ]; then
              printf 'server {\n    listen 80;\n    server_name doritaminot.uz www.doritaminot.uz;\n    location / { return 200 ok; add_header Content-Type text/plain; }\n}\n' > /etc/nginx/conf.d/doritaminot.conf
              systemctl stop httpd 2>/dev/null || true
              systemctl enable nginx
              nginx -t && (systemctl is-active --quiet nginx && systemctl reload nginx || systemctl start nginx)
              certbot certonly --nginx \
                -d doritaminot.uz -d www.doritaminot.uz \
                --non-interactive --agree-tos \
                -m ${{ secrets.CERTBOT_EMAIL }}
            fi

            # ── 8. Auto-yangilash (cron) ───────────────────────────────────
            (crontab -l 2>/dev/null | grep -q 'certbot renew') || \
              { crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --quiet --post-hook 'systemctl reload nginx'"; } | crontab -

            # ── 9. Nginx HTTPS konfiguratsiya ─────────────────────────────
            cp /var/www/doritaminot/nginx/doritaminot.conf /etc/nginx/conf.d/doritaminot.conf
            systemctl stop httpd 2>/dev/null || true
            systemctl disable httpd 2>/dev/null || true
            nginx -t
            systemctl enable nginx
            systemctl restart nginx
